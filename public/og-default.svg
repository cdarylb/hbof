<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&amp;display=swap');
    </style>
  </defs>

  <!-- Fond -->
  <rect width="1200" height="630" fill="#F7F4EF"/>

  <!-- Cadre extérieur -->
  <rect x="28" y="28" width="1144" height="574" fill="none" stroke="#DDD7CE" stroke-width="1"/>

  <!-- Marques de coin en accent -->
  <!-- Coin haut gauche -->
  <line x1="28" y1="28" x2="80" y2="28" stroke="#C4955A" stroke-width="1.5"/>
  <line x1="28" y1="28" x2="28" y2="80" stroke="#C4955A" stroke-width="1.5"/>
  <!-- Coin haut droit -->
  <line x1="1172" y1="28" x2="1120" y2="28" stroke="#C4955A" stroke-width="1.5"/>
  <line x1="1172" y1="28" x2="1172" y2="80" stroke="#C4955A" stroke-width="1.5"/>
  <!-- Coin bas gauche -->
  <line x1="28" y1="602" x2="80" y2="602" stroke="#C4955A" stroke-width="1.5"/>
  <line x1="28" y1="602" x2="28" y2="550" stroke="#C4955A" stroke-width="1.5"/>
  <!-- Coin bas droit -->
  <line x1="1172" y1="602" x2="1120" y2="602" stroke="#C4955A" stroke-width="1.5"/>
  <line x1="1172" y1="602" x2="1172" y2="550" stroke="#C4955A" stroke-width="1.5"/>

  <!-- Nom du site -->
  <text
    x="600" y="280"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="140"
    font-weight="600"
    letter-spacing="28"
    text-anchor="middle"
    fill="#18170F"
  >Hbof</text>

  <!-- Ornement central -->
  <line x1="490" y1="328" x2="548" y2="328" stroke="#DDD7CE" stroke-width="1"/>
  <text x="600" y="334" text-anchor="middle" font-size="9" fill="#C4955A" letter-spacing="14" font-family="Georgia, serif">◆  ◆  ◆</text>
  <line x1="652" y1="328" x2="710" y2="328" stroke="#DDD7CE" stroke-width="1"/>

  <!-- Tagline -->
  <text
    x="600" y="400"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="32"
    font-weight="300"
    font-style="italic"
    letter-spacing="5"
    text-anchor="middle"
    fill="#9B9690"
  >Chroniques Olfactives</text>

  <!-- URL -->
  <text
    x="600" y="563"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="18"
    font-weight="400"
    letter-spacing="10"
    text-anchor="middle"
    fill="#C4955A"
  >hbof.me</text>
</svg>
